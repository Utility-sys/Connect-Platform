databases:
  # 1. PostgreSQL Database
  - name: connect-db
    plan: free
    databaseName: connect_db

services:
  # 2. Connect Full-Stack Platform
  - type: web
    name: connect-platform
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: connect-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
