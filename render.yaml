databases:
  # 1. PostgreSQL Database
  - name: connect-db
    plan: free
    databaseName: connect_db
    user: postgres

services:
  # 2. Connect Backend API
  - type: web
    name: connect-backend
    env: node
    plan: free
    rootDir: connect-backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: connect-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000

  # 3. Connect Frontend (Main Site)
  - type: web
    name: connect-frontend
    env: static
    plan: free
    rootDir: connect-frontend
    buildCommand: npm install && npm run build
    staticPublishDir: dist
    envVars:
      - key: VITE_API_BASE
        fromService:
          name: connect-backend
          type: web
          property: url
        suffix: /api

  # 4. Connect Admin Dashboard
  - type: web
    name: connect-admin
    env: static
    plan: free
    rootDir: connect-admin
    buildCommand: npm install && npm run build
    staticPublishDir: dist
    envVars:
      - key: VITE_API_BASE
        fromService:
          name: connect-backend
          type: web
          property: url
        suffix: /api
